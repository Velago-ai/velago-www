kind = "web"
previewPath = "/"
title = "VelaGo Landing"
version = "1.0.0"
id = "artifacts/velago-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22473

[services.development]
run = "pnpm --filter @workspace/velago-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/velago-landing", "run", "build" ]
publicDir = "artifacts/velago-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22473"
BASE_PATH = "/"
